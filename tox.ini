[tox]
min_version = 4.0
env_list = all-checks

[testenv]
description = leanSpec now uses just for task orchestration
skip_install = true
allowlist_externals = printf, false
commands =
    printf '\n\033[1m  leanSpec has migrated from tox to just.\033[0m\n\n  Install just with:\n    uv tool install just-bin\n\n  Run \033[1mjust\033[0m to see available recipes.\n\n'
    false

[testenv:all-checks]
commands =
    printf '\n\033[1m  leanSpec has migrated from tox to just.\033[0m\n\n  Use:\n    \033[1mjust check\033[0m\n\n'
    false

